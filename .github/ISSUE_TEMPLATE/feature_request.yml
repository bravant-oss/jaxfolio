name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For substantial or cross-cutting changes, please
        outline the motivation so maintainers can discuss the approach before
        implementation (see GOVERNANCE.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that jaxfolio doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API or behavior look like? Include a sketch if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art (papers, other libraries).
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this.
