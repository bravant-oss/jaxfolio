name: Bug report
description: Report a problem with jaxfolio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues
        first. For security vulnerabilities, do **not** use this form — follow
        [SECURITY.md](https://github.com/bravant-oss/jaxfolio/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducible example
      description: The smallest snippet that reproduces the problem.
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback / output
      description: Full error output, if any.
      render: shell
  - type: input
    id: version
    attributes:
      label: jaxfolio version
      description: Output of `python -c "import jaxfolio; print(jaxfolio.__version__)"`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        OS, Python version, and key dependency versions. Paste the output of:
        `uv pip freeze | grep -Ei "jax|numpy|scipy|pandas"`
    validations:
      required: true
